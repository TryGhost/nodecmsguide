name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel in-progress runs on the same ref except for main.
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & typecheck (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
      - name: Read Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
      - run: corepack enable
      - run: pnpm config set store-dir ~/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm lint
      - run: pnpm typecheck

  unit-tests:
    name: Unit tests (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
      - name: Read Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
      - run: corepack enable
      - run: pnpm config set store-dir ~/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-node-${{ steps.node-version.outputs.version }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Fixture mode keeps PRs off the real GitHub API — no secrets required,
      # deterministic output, fast. The scheduled smoke.yml workflow exercises
      # the real-GitHub path separately.
      NODE_CMS_USE_FIXTURE: '1'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
      - name: Read Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
      - run: corepack enable
      - run: pnpm config set store-dir ~/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build

  e2e:
    name: E2E (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Fixture mode keeps PRs off the real GitHub API — no secrets required,
      # deterministic output, fast. The scheduled smoke.yml workflow exercises
      # the real-GitHub path separately.
      NODE_CMS_USE_FIXTURE: '1'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
      - name: Read Node version
        id: node-version
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
      - run: corepack enable
      - run: pnpm config set store-dir ~/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ steps.node-version.outputs.version }}-
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # Cache Playwright browsers keyed on the lockfile's @playwright/test entry.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - run: pnpm build
      - run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  required-checks-pass:
    name: Required checks pass
    if: always()
    needs: [lint-and-typecheck, unit-tests, build, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
